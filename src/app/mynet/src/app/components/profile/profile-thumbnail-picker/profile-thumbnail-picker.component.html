<div class="thumbnail-grid">
    @for (image of images; track $index) {
        <img
        [src]="image.blobUrl"
        [class.selected]="image === selectedImage"
        (click)="selectImage(image)" />
    }
  
</div>

<button (click)="setProfilePicture()" [disabled]="!selectedImage">Set as Profile Picture</button>
